<div class="container mx-auto px-4 py-12 max-w-2xl">
  <mat-card class="!rounded-2xl overflow-hidden shadow-xl border border-slate-100">
    <div class="h-32 bg-gradient-to-r from-indigo-600 to-violet-600"></div>
    <div class="px-8 pb-8">
      <div class="relative flex justify-center">
        <div class="absolute -top-16 bg-white p-2 rounded-full shadow-lg">
          <div class="w-28 h-28 bg-slate-100 rounded-full flex items-center justify-center text-indigo-600">
            <mat-icon class="!text-5xl">account_circle</mat-icon>
          </div>
        </div>
      </div>
      
      <div class="mt-16 text-center">
        <h1 class="text-2xl font-bold text-slate-900">{{ user()?.email }}</h1>
        <p class="text-slate-500 uppercase tracking-widest text-xs font-bold mt-1">{{ user()?.role }} Account</p>
      </div>

      <div class="mt-12 space-y-6">
        <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
          <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-slate-500 shadow-sm">
            <mat-icon>mail</mat-icon>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-bold uppercase">Email Address</p>
            <p class="text-slate-700 font-medium">{{ user()?.email }}</p>
          </div>
        </div>

        <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
          <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-slate-500 shadow-sm">
            <mat-icon>phone</mat-icon>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-bold uppercase">Phone Number</p>
            <p class="text-slate-700 font-medium">{{ user()?.phone || 'Not provided' }}</p>
          </div>
        </div>

        <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
          <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-slate-500 shadow-sm">
            <mat-icon>verified</mat-icon>
          </div>
          <div>
            <p class="text-xs text-slate-400 font-bold uppercase">Status</p>
            <p class="text-emerald-600 font-bold" *ngIf="user()?.is_verified">Verified Account</p>
            <p class="text-amber-600 font-bold" *ngIf="!user()?.is_verified">Unverified Account</p>
          </div>
        </div>
      </div>

      <div class="mt-12 flex gap-4">
        <button mat-flat-button color="primary" class="flex-1 !py-6 !rounded-xl font-bold">Edit Profile</button>
        <button mat-stroked-button (click)="authService.logout()" class="flex-1 !py-6 !rounded-xl font-bold !text-red-600 !border-red-100">Logout</button>
      </div>
    </div>
  </mat-card>
</div>
