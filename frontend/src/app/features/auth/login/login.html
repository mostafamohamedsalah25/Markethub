<div class="min-h-screen flex items-center justify-center bg-slate-50 p-6 font-inter">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center p-3 bg-white rounded-xl shadow-sm border border-slate-200 mb-4">
        <mat-icon class="text-indigo-600 scale-150">hub</mat-icon>
      </div>
      <h1 class="text-3xl font-bold text-slate-900 tracking-tight">NexusCommerce</h1>
      <p class="text-slate-500 mt-2">Access your commerce workspace.</p>
    </div>

    <mat-card class="rounded-2xl shadow-lg border border-slate-200 !bg-white">
      <mat-card-content class="!p-8">

        <div *ngIf="errorMessage()" class="bg-red-50 text-red-700 p-4 rounded-lg mb-6 text-sm flex items-center gap-2 border border-red-100">
          <mat-icon class="scale-75">error_outline</mat-icon>
          {{ errorMessage() }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" formControlName="email" placeholder="name@company.com">
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
            <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button">
              <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
          </mat-form-field>

          <div class="flex justify-end mt(-2) mb-2">
            <a routerLink="/auth/forgot-password" class="text-sm text-indigo-600 hover:underline font-medium">Forgot Password?</a>
          </div>

          <button mat-flat-button color="primary" type="submit" class="!py-6 !text-base !rounded-lg" [disabled]="isLoading()">
            <span *ngIf="!isLoading()">Sign In to Nexus</span>
            <mat-spinner *ngIf="isLoading()" diameter="24" color="accent"></mat-spinner>
          </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
          Don't have an account? <a routerLink="/auth/register" class="text-indigo-600 font-semibold hover:underline">Sign up</a>
        </p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
