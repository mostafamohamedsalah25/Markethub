<div class="container mx-auto px-4 py-8 max-w-7xl">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800">My Products</h1>
  </div>

  <div class="bg-white rounded-lg shadow border border-gray-200 p-6 mb-8">
    <h2 class="text-xl font-bold mb-4">Add New Product</h2>
    <form (ngSubmit)="addProduct()" #productForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-700">Product Name</label>
        <input type="text" [(ngModel)]="newProduct.name" (input)="generateSlug()" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Slug</label>
        <input type="text" [(ngModel)]="newProduct.slug" name="slug" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea [(ngModel)]="newProduct.description" name="description" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Category</label>
        <select [(ngModel)]="newProduct.category" name="category" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          <option value="" disabled>Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Stock Quantity</label>
        <input type="number" [(ngModel)]="newProduct.stock" name="stock" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Price ($)</label>
        <input type="number" [(ngModel)]="newProduct.price" name="price" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Discount Price ($) (Optional)</label>
        <input type="number" [(ngModel)]="newProduct.discount_price" name="discount_price" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700">Images</label>
        <input type="file" multiple (change)="onFileSelect($event)" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
      </div>
      <div class="md:col-span-2 text-right">
        <button type="submit" [disabled]="productForm.invalid || loading" class="px-6 py-2 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-700 disabled:bg-gray-400">
          {{ loading ? 'Saving...' : 'Add Product' }}
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="loading && products.length === 0" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div *ngFor="let product of products" class="bg-white rounded-lg shadow overflow-hidden border border-gray-200 flex flex-col">
      <img [src]="product.images?.length ? product.images[0].image : 'assets/placeholder.jpg'" class="h-48 w-full object-cover">
      <div class="p-4 flex-1 flex flex-col">
        <h3 class="font-medium text-gray-900 truncate mb-1">{{ product.name }}</h3>
        <p class="text-sm text-gray-500 mb-2">Stock: {{ product.stock }}</p>
        <div class="mt-auto flex justify-between items-center">
          <span class="font-bold text-indigo-600">${{ product.discount_price || product.price }}</span>
          <button (click)="deleteProduct(product.slug)" class="text-red-600 hover:text-red-800 text-sm font-medium">Deactivate</button>
        </div>
      </div>
    </div>
  </div>
</div>
