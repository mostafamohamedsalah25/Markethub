<div class="bg-surface rounded-[1.5rem] overflow-hidden flex flex-col max-h-[90vh]">
  
  <!-- Header -->
  <div class="px-8 py-6 border-b border-outline bg-surface-container-low flex justify-between items-center shrink-0">
    <h2 class="text-xl font-extrabold text-on-surface tracking-tight">
      {{ isEdit ? 'Edit Promo Code' : 'Create Promo Code' }}
    </h2>
    <button type="button" (click)="cancel()" class="w-8 h-8 rounded-full flex items-center justify-center bg-surface border border-outline hover:bg-surface-hover transition-colors text-on-surface-variant">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>
  </div>

  <!-- Content (Scrollable) -->
  <div class="p-8 overflow-y-auto custom-scrollbar flex-1">
    <form [formGroup]="form" class="space-y-6">
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Code</label>
          <input formControlName="code" type="text" placeholder="e.g. SUMMER25" 
                 class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all uppercase placeholder:normal-case placeholder:font-medium">
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Discount Type</label>
          <div class="relative bg-surface-container-low border border-outline rounded-xl focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all">
            <select formControlName="discount_type" class="w-full bg-transparent border-none px-4 py-3 text-sm font-bold text-on-surface outline-none appearance-none cursor-pointer">
              <option value="percentage">Percentage (%)</option>
              <option value="fixed">Fixed Amount ($)</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Value</label>
          <input formControlName="value" type="text" placeholder="10 or 25.50" 
                 class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Min Order Amount ($)</label>
          <input formControlName="minimum_order_amount" type="text" placeholder="0" 
                 class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Max Uses <span class="normal-case tracking-normal font-medium opacity-70">(Leave empty for unlimited)</span></label>
        <input formControlName="max_uses" type="number" placeholder="100" 
               class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-bold text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Starts At (Optional)</label>
          <input formControlName="starts_at" type="datetime-local" 
                 class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-medium text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all cursor-pointer">
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-extrabold uppercase tracking-widest text-on-surface-variant">Expires At (Optional)</label>
          <input formControlName="expires_at" type="datetime-local" 
                 class="w-full bg-surface-container-low border border-outline rounded-xl px-4 py-3 text-sm font-medium text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all cursor-pointer">
        </div>
      </div>

      <div class="flex items-center gap-3 pt-2">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" formControlName="is_active" class="sr-only peer">
          <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-outline after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
        </label>
        <span class="text-sm font-extrabold text-on-surface">Campaign is Active</span>
      </div>
    </form>
  </div>

  <!-- Actions -->
  <div class="px-8 py-5 border-t border-outline bg-surface-container-lowest flex justify-end gap-3 shrink-0">
    <button type="button" (click)="cancel()" [disabled]="saving" class="mh-btn mh-btn-ghost px-6 disabled:opacity-50">
      Cancel
    </button>
    <button type="button" (click)="save()" [disabled]="saving" class="mh-btn mh-btn-brand px-8 shadow-md disabled:opacity-50">
      {{ saving ? 'Saving...' : 'Save Promo' }}
    </button>
  </div>
</div>
