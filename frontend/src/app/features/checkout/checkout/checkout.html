<div class="checkout-page container mx-auto px-4 py-8 max-w-6xl">
  <nav class="text-sm text-gray-500 mb-6">
    <a routerLink="/cart" class="hover:text-indigo-600">Cart</a>
    <span class="mx-2">/</span>
    <span class="text-gray-800 font-medium">Checkout</span>
  </nav>

  <h1 class="text-3xl font-bold text-gray-900 mb-8">Checkout</h1>

  @if (loading) {
    <div class="flex justify-center py-16">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>
  } @else if (cart) {
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
          <h2 class="text-xl font-bold text-gray-900 mb-6">Shipping Details</h2>

          <form (ngSubmit)="placeOrder()" #checkoutForm="ngForm" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Shipping Address</label>
              <textarea
                [(ngModel)]="shippingAddress"
                name="shippingAddress"
                required
                rows="4"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                placeholder="Street, building, city, postal code"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Contact Phone</label>
              <input
                type="tel"
                [(ngModel)]="contactPhone"
                name="contactPhone"
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                placeholder="e.g. 01012345678" />
            </div>

            <button
              type="submit"
              [disabled]="checkoutForm.invalid || processing"
              class="w-full py-3.5 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 disabled:bg-gray-400 transition">
              {{ processing ? 'Processing order...' : 'Confirm & Place Order' }}
            </button>
          </form>
        </div>
      </div>

      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
          <h2 class="text-xl font-bold text-gray-900 mb-6">Order Summary</h2>

          <ul class="space-y-4 mb-6 max-h-72 overflow-y-auto">
            @for (item of cart.items; track item.id) {
              <li class="flex gap-3 items-start">
                <img
                  [src]="item.product_details?.images?.[0]?.image || 'https://placehold.co/80?text=+'"
                  [alt]="item.product_details?.name || 'Product'"
                  class="w-14 h-14 object-cover rounded-lg border border-gray-100" />
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-gray-900 truncate">{{ item.product_details?.name }}</p>
                  <p class="text-xs text-gray-500">Qty: {{ item.quantity }}</p>
                </div>
                <span class="text-sm font-semibold">${{ lineTotal(item) }}</span>
              </li>
            }
          </ul>

          <div class="border-t border-gray-200 pt-4 flex justify-between text-lg font-bold">
            <span>Total</span>
            <span class="text-indigo-600">${{ cart.total_price }}</span>
          </div>
        </div>
      </div>
    </div>
  }
</div>
