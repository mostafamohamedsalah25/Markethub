<header class="bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm sticky top-0 z-50 font-inter">
  <div class="flex justify-between items-center px-6 py-3 w-full max-w-[1280px] mx-auto">

    <div class="flex items-center gap-8">
      <a routerLink="/" class="text-2xl font-black tracking-tight text-indigo-600 flex items-center gap-2">
        <mat-icon>hub</mat-icon>
        NexusCommerce
      </a>

      <nav class="hidden md:flex items-center gap-6">
        @for (link of navLinks; track link.label) {
          @if (link.route) {
            <a 
              [routerLink]="link.route" 
              [queryParams]="link.queryParams || {}"
              routerLinkActive="text-indigo-600 border-indigo-600" 
              [routerLinkActiveOptions]="{exact: true}" 
              class="text-slate-600 font-medium border-b-2 border-transparent pb-1 hover:text-indigo-600 transition-colors"
            >
              {{ link.label }}
            </a>
          } @else if (link.feature) {
            <button 
              (click)="showComingSoon(link.feature)"
              class="text-slate-600 font-medium border-b-2 border-transparent pb-1 hover:text-indigo-600 transition-colors cursor-pointer"
            >
              {{ link.label }}
            </button>
          }
        }
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <app-search-bar class="hidden lg:block"></app-search-bar>

      <ng-container *ngIf="isAuthenticated(); else loggedOut">
        <a *ngIf="isSellerOrAdmin()" [routerLink]="currentUser()?.role === 'admin' ? '/admin' : '/seller'" mat-button color="primary" class="!rounded-full hidden sm:inline-flex">
          Dashboard
        </a>

        <button mat-icon-button class="text-slate-600 hover:bg-slate-100" routerLink="/cart">
          <mat-icon matBadgeColor="warn" matBadgeSize="small">shopping_cart</mat-icon>
        </button>

        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="text-slate-600 hover:bg-slate-100 border border-slate-200">
          <mat-icon>account_circle</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" class="!mt-2 !rounded-xl !min-w-[200px]">
          <div class="px-4 py-3 border-b border-slate-100">
            <p class="text-sm font-bold text-slate-900 truncate">{{ currentUser()?.email }}</p>
            <p class="text-xs text-slate-500 uppercase tracking-wider mt-1">{{ currentUser()?.role }}</p>
          </div>
          <button mat-menu-item routerLink="/profile">
            <mat-icon class="text-slate-500">person</mat-icon>
            <span>My Profile</span>
          </button>
          <button mat-menu-item routerLink="/my-orders">
            <mat-icon class="text-slate-500">receipt_long</mat-icon>
            <span>My Orders</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()" class="!text-red-600">
            <mat-icon class="text-red-600">logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-container>

      <ng-template #loggedOut>
        <a routerLink="/auth/login" mat-button class="text-slate-600 font-medium">Log in</a>
        <a routerLink="/auth/register" mat-flat-button color="primary" class="!rounded-lg font-medium">Sign up</a>
      </ng-template>
    </div>

  </div>
</header>
