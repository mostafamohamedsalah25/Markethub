<section class="py-16 md:py-24 max-w-[1200px] mx-auto px-4 md:px-8 animate-fade-in-up">
  <div class="bg-surface-container-low border border-outline rounded-[3rem] overflow-hidden relative p-10 md:p-20 flex flex-col items-center text-center shadow-lg">
    
    <div class="absolute -top-32 -left-32 w-80 h-80 bg-cyan-400 rounded-full blur-[100px] opacity-10 pointer-events-none"></div>
    <div class="absolute -bottom-32 -right-32 w-80 h-80 bg-purple-500 rounded-full blur-[100px] opacity-10 pointer-events-none"></div>

    <div class="relative z-10 max-w-xl flex flex-col items-center gap-6">
      <div class="w-16 h-16 rounded-[1.5rem] bg-surface flex items-center justify-center border border-outline shadow-sm text-primary">
        <span class="material-symbols-outlined text-3xl">mail</span>
      </div>
      
      <div>
        <h2 class="text-3xl md:text-5xl font-extrabold text-on-surface tracking-tight mb-3">Join the VIP Circle</h2>
        <p class="text-sm md:text-base font-medium text-on-surface-variant leading-relaxed">
          Get early access to exclusive collections, private sales, and the latest news in modern commerce.
        </p>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 w-full mt-4">
        <input 
          type="email" [(ngModel)]="email" placeholder="Enter your email address"
          class="flex-1 bg-surface border border-outline text-on-surface placeholder:text-on-surface-variant/50 rounded-2xl px-6 py-4 text-sm font-semibold focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all"
          [disabled]="isSubmitting"
        />
        <button 
          (click)="onSubscribe()" [disabled]="isSubmitting"
          class="mh-btn mh-btn-brand px-8 py-4 sm:w-auto w-full shadow-lg shadow-primary/20 flex items-center justify-center"
        >
          @if (isSubmitting) {
            <span class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          } @else {
            Subscribe
          }
        </button>
      </div>

      @if (successMessage) { <p class="text-emerald-500 font-extrabold text-sm animate-scale-in">{{ successMessage }}</p> }
      @if (errorMessage) { <p class="text-error font-extrabold text-sm animate-scale-in">{{ errorMessage }}</p> }

      <p class="text-on-surface-variant/60 text-[10px] font-extrabold uppercase tracking-widest mt-2">
        By subscribing, you agree to our <a class="underline hover:text-primary cursor-pointer">Privacy Policy</a>.
      </p>
    </div>
  </div>
</section>
