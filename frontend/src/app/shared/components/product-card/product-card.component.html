<div [routerLink]="['/products', product.slug]" class="mh-card-hover group relative flex flex-col overflow-hidden cursor-pointer h-full">
  
  <div class="relative aspect-[4/5] overflow-hidden border-b" style="border-color: var(--mh-border);">
    
    <img 
      [src]="product.images | primaryImage" 
      (error)="onImageError($event)" 
      [alt]="product.name"
      class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" 
    />

    <div class="absolute inset-0 bg-slate-950/40 opacity-0 group-hover:opacity-100 backdrop-blur-sm transition-all duration-300 flex items-center justify-center gap-4 z-10">
      
      <button
        (click)="toggleWishlist($event)"
        class="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 border border-white/20 text-white backdrop-blur-md transform scale-0 group-hover:scale-100 transition-all duration-300 delay-75 hover:bg-white/20 hover:text-rose-400 active:scale-95"
        [attr.aria-label]="isInWishlist() ? 'Remove from wishlist' : 'Add to wishlist'"
      >
        <i [class]="isInWishlist() ? 'fa-solid fa-heart text-rose-400' : 'fa-regular fa-heart'" class="text-lg"></i>
      </button>

      <button
        (click)="addToCart($event)"
        [disabled]="product.stock === 0"
        class="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 border border-white/20 text-white backdrop-blur-md transform scale-0 group-hover:scale-100 transition-all duration-300 delay-100 hover:bg-white/20 hover:text-cyan-400 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
        [attr.aria-label]="'Add ' + product.name + ' to cart'"
      >
        <i class="fa-solid fa-cart-plus text-lg"></i>
      </button>
    </div>

    <div class="absolute top-3 left-3 flex flex-col gap-2 z-20">
      @if (product.stock === 0) {
        <span class="mh-badge mh-badge-error shadow-sm">
          Sold Out
        </span>
      } @else if (hasDiscount) {
        <span class="mh-badge" style="background: var(--mh-text-primary); color: var(--mh-bg); box-shadow: var(--mh-shadow-xs);">
          Sale
        </span>
      }
    </div>
  </div>

  <div class="p-5 flex-grow flex flex-col justify-between">
    
    <div class="space-y-1.5">
      <h4 class="font-sans font-bold text-[15px] leading-snug line-clamp-2 min-h-[44px] transition-colors duration-200 group-hover:text-[var(--mh-brand)]" style="color: var(--mh-text-primary);">
        {{ product.name }}
      </h4>

      <app-star-rating [rating]="product.average_rating || 0" [count]="product.review_count || 0"></app-star-rating>
    </div>

    <div class="flex items-center gap-2 pt-3 mt-auto">
      @if (hasDiscount) {
        <span class="text-lg font-extrabold" style="color: var(--mh-text-primary);">
          {{ product.discount_price | currency }}
        </span>
        <span class="line-through text-sm font-medium" style="color: var(--mh-text-muted);">
          {{ product.price | currency }}
        </span>
      } @else {
        <span class="text-lg font-extrabold" style="color: var(--mh-text-primary);">
          {{ product.price | currency }}
        </span>
      }
    </div>
  </div>
</div>
